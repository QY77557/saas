<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>用户版</title>
    <style>
        body{background:#0a0f1e;color:#0f0;font-family:system-ui;padding:20px;}
        button{background:#3b82f6;color:white;padding:10px 20px;border-radius:60px;border:none;cursor:pointer;}
    </style>
</head>
<body>
    <h1>👤 用户版</h1>
    <p>测试 API 连接</p>
    <button onclick="testAPI()">测试发布API</button>
    <div id="result"></div>

    <script>
        async function testAPI() {
            try {
                let res = await fetch("/api/publish", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        siteId: "test123",
                        siteName: "测试站点",
                        source: "<h1>Hello World</h1>"
                    })
                });
                let data = await res.json();
                document.getElementById("result").innerHTML = "<pre>" + JSON.stringify(data, null, 2) + "</pre>";
                if(data.success) {
                    alert("发布成功！链接：" + data.url);
                } else {
                    alert("发布失败：" + data.error);
                }
            } catch(e) {
                document.getElementById("result").innerHTML = "错误：" + e.message;
            }
        }
    </script>
</body>
</html>
