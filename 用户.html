<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>龙傲天 · 用户版</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#f5f7fc;font-family:'Inter',system-ui;padding:20px;color:#1a2c3e;}
        .container{max-width:1400px;margin:0 auto;}
        .card{background:#fff;border-radius:32px;padding:28px;margin-bottom:28px;box-shadow:0 2px 6px rgba(0,0,0,0.02);border:1px solid rgba(0,0,0,0.03);}
        .hero-card{background:linear-gradient(135deg,#1e6f3f,#0b3b24);border-radius:40px;padding:48px 32px;margin-bottom:40px;text-align:center;color:white;}
        .hero-card h1{font-size:2.2rem;}
        input,textarea,select{width:100%;padding:14px 18px;border-radius:60px;border:1px solid #e2e8f0;background:#fff;font-size:0.95rem;margin:10px 0;}
        button{background:#1e6f3f;color:white;padding:14px 24px;border-radius:60px;border:none;width:100%;cursor:pointer;font-weight:600;}
        button:hover{background:#155a34;}
        .balance{font-size:2.2rem;font-weight:800;color:#1e6f3f;margin:12px 0;}
        .tab{display:flex;gap:12px;margin-bottom:28px;flex-wrap:wrap;}
        .tab-btn{background:#eef2f9;border-radius:60px;padding:10px 24px;cursor:pointer;color:#2c4f6e;font-weight:500;}
        .tab-btn.active{background:#1e6f3f;color:white;}
        .product-item{background:#f8fafc;border-radius:28px;padding:20px;margin-top:16px;border:1px solid #edf2f7;}
        .flex-between{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
        .price{color:#1e6f3f;font-weight:700;}
        .copy-btn{background:#eef2f9;color:#1e6f3f;width:auto;padding:8px 16px;}
        .hidden{display:none;}
        .goods-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px;}
        .code-preview{background:#f1f5f9;border-radius:24px;padding:16px;font-family:monospace;font-size:0.7rem;overflow:auto;max-height:400px;}
        .success-box{background:#e6f7ec;border-radius:24px;padding:16px;margin-top:12px;color:#1e6f3f;}
        .invite-code{background:#f1f5f9;border-radius:60px;padding:12px 20px;font-family:monospace;word-break:break-all;}
    </style>
</head>
<body>
<div class="container">
    <div id="authPanel" class="card">
        <h2>🔐 龙傲天 · 登录</h2>
        <input type="text" id="loginUser" placeholder="用户名/邮箱/手机号">
        <input type="password" id="loginPass" placeholder="密码">
        <button id="loginBtn">登录</button>
        <div class="flex-between" style="margin-top:10px;">
            <button id="toRegisterBtn" style="background:#eef2f9;color:#1a2c3e;width:48%;">注册账号</button>
            <button id="toResetBtn" style="background:#eef2f9;color:#1a2c3e;width:48%;">忘记密码</button>
        </div>
    </div>

    <div id="registerPanel" class="card hidden">
        <h2>📝 注册龙傲天</h2>
        <input type="text" id="regUsername" placeholder="用户名">
        <input type="text" id="regEmail" placeholder="邮箱">
        <input type="text" id="regPhone" placeholder="手机号">
        <input type="password" id="regPass" placeholder="密码">
        <input type="text" id="regInviteCode" placeholder="邀请码（选填，双方得20积分）">
        <div class="flex-between" style="gap:10px;">
            <input type="text" id="regCode" placeholder="验证码" style="flex:2;">
            <button id="sendCodeBtn" style="flex:1;background:#eef2f9;color:#1a2c3e;">获取验证码</button>
        </div>
        <button id="registerBtn">注册</button>
        <button id="backToLoginBtn" style="background:#eef2f9;color:#1a2c3e;">返回登录</button>
    </div>

    <div id="resetPanel" class="card hidden">
        <h2>🔒 重置密码</h2>
        <input type="text" id="resetAccount" placeholder="用户名/邮箱/手机号">
        <div id="securityQuestion" style="display:none;"><p>安全问题：<span id="questionText"></span></p><input type="text" id="securityAnswer" placeholder="答案"></div>
        <div id="newPassArea" style="display:none;"><input type="password" id="newPassword" placeholder="新密码"></div>
        <button id="resetNextBtn">下一步</button>
        <button id="resetConfirmBtn" style="display:none;">确认重置</button>
        <button id="backToLoginBtn2" style="background:#eef2f9;color:#1a2c3e;">返回登录</button>
    </div>

    <div id="mainPanel" class="hidden">
        <div class="hero-card"><h1>⚡ 龙傲天 · SaaS 引擎</h1><p>一键部署 | 入驻仅需 50 元</p></div>
        <div class="card">
            <div class="flex-between"><h2>👤 用户中心</h2><button id="logoutBtn" style="width:auto;background:#eef2f9;color:#1a2c3e;">退出</button></div>
            <div class="balance" id="balance">¥0</div>
            <div class="flex-between">
                <button id="showRechargeBtn">💰 充值申请</button>
                <button id="showWithdrawBtn">💸 提现</button>
                <button id="showCardBtn">🎫 卡密兑换</button>
                <button id="showGenerateCardBtn">✨ 生成卡密</button>
                <button id="showInviteBtn">🎁 邀请好友</button>
            </div>
        </div>

        <div class="tab">
            <div class="tab-btn active" data-tab="shop">商城</div><div class="tab-btn" data-tab="myProducts">我的商品</div>
            <div class="tab-btn" data-tab="orders">交易记录</div><div class="tab-btn" data-tab="webLock">网页卡密锁</div>
            <div class="tab-btn" data-tab="sites">我的站点</div><div class="tab-btn" data-tab="genCard">生成卡密</div>
            <div class="tab-btn" data-tab="service">客服中心</div><div class="tab-btn" data-tab="invite">邀请管理</div>
        </div>

        <div id="shopTab" class="tab-content"><div class="card"><h3>🛒 商城</h3><div id="productList" class="goods-grid"></div></div></div>
        <div id="myProductsTab" class="tab-content hidden"><div class="card"><div class="flex-between"><h3>我的商品</h3><button id="createProductBtn" style="width:auto;">+发布</button></div><div id="myProductsList"></div></div></div>
        <div id="ordersTab" class="tab-content hidden"><div class="card"><h3>交易记录</h3><div id="ordersList"></div></div></div>
        <div id="webLockTab" class="tab-content hidden"><div class="card"><h3>🔒 网页卡密锁</h3><textarea id="webSource" rows="6" placeholder="粘贴网页源码"></textarea><input type="text" id="lockPassword" placeholder="卡密" value="RL2026"><button id="generateWebLockBtn">生成加密网页</button><button id="copyWebLockBtn" class="copy-btn hidden">📋 复制</button><div id="webLockPreview" class="hidden"></div></div></div>
        <div id="sitesTab" class="tab-content hidden"><div class="card"><h3>🚀 创建站点</h3><input type="text" id="siteName" placeholder="站点名"><input type="text" id="subDomain" placeholder="子域名"><textarea id="siteSource" rows="6" placeholder="HTML源码"></textarea><button id="createSiteBtn">部署（扣费）</button></div><div class="card"><h3>我的站点</h3><div id="mySites"></div></div></div>
        <div id="genCardTab" class="tab-content hidden"><div class="card"><h3>✨ 生成卡密</h3><p>余额：<span id="genBalance">¥0</span></p><select id="productForCard"></select><input type="number" id="cardUses" placeholder="次数" value="1"><button id="genProductCardBtn">生成卡密（扣商品价）</button><div id="genCardResult" class="success-box hidden"></div></div><div class="card"><h3>我的卡密</h3><div id="myGeneratedCards"></div></div></div>
        <div id="serviceTab" class="tab-content hidden"><div class="card"><h3>🎧 客服中心</h3><p>📞 微信 longaotian_kf | 📧 service@longaotian.com</p><textarea id="complaintContent" rows="3" placeholder="投诉内容"></textarea><input type="text" id="complaintContact" placeholder="联系方式"><button id="submitComplaintBtn">提交投诉</button><div id="complaintResult" class="success-box hidden"></div></div><div class="card"><h3>我的投诉</h3><div id="myComplaints"></div></div></div>
        <div id="inviteTab" class="tab-content hidden"><div class="card"><h3>🎁 我的邀请码</h3><div id="myInviteCode" class="invite-code"></div><button id="generateInviteBtn">生成新邀请码</button><button id="copyInviteBtn" class="copy-btn">复制</button></div><div class="card"><h3>邀请记录</h3><div id="inviteRecords"></div></div></div>
    </div>
</div>

<!-- 弹窗 -->
<div id="rechargeModal" class="card hidden" style="position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); z-index:1000; max-width:450px;">
    <h3>💳 充值申请</h3>
    <img src="https://i.ibb.co/LXBJcgVh/mm-facetoface-collect-qrcode-1778001786663.png" style="width:180px; margin:10px auto; display:block;">
    <input type="number" id="applyAmount" placeholder="金额" value="100">
    <input type="file" id="proofImage" accept="image/*"><div id="proofPreview"></div>
    <button id="submitApplyBtn">提交申请</button><button id="closeRechargeBtn">取消</button>
</div>
<div id="withdrawModal" class="card hidden" style="position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); z-index:1000; max-width:450px;">
    <h3>💸 提现申请</h3>
    <p>余额：<span id="withdrawBalance">¥0</span></p>
    <input type="number" id="withdrawAmount" placeholder="金额"><input type="text" id="withdrawAccount" placeholder="微信号/手机号">
    <input type="file" id="withdrawImage" accept="image/*"><div id="withdrawImagePreview"></div>
    <button id="submitWithdrawBtn">提交</button><button id="closeWithdrawBtn">取消</button>
</div>
<div id="cardModal" class="card hidden" style="position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); z-index:1000; max-width:400px;">
    <h3>🎫 卡密兑换</h3><input type="text" id="cardCode" placeholder="输入卡密"><button id="redeemCardBtn">兑换</button><button id="closeCardBtn">取消</button>
</div>
<div id="modalOverlay" class="hidden" style="position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.8); z-index:999;"></div>

<script>
    // 完整功能JS
    let allUsers = JSON.parse(localStorage.getItem("all_users")) || [];
    let products = JSON.parse(localStorage.getItem("products")) || [];
    let withdrawRequests = JSON.parse(localStorage.getItem("withdraw_requests")) || [];
    let productCards = JSON.parse(localStorage.getItem("product_cards")) || [];
    let complaints = JSON.parse(localStorage.getItem("complaints")) || [];
    let inviteCodes = JSON.parse(localStorage.getItem("invite_codes")) || [];
    let currentUser = null;
    let sentCode = null;

    function saveAll() { localStorage.setItem("all_users", JSON.stringify(allUsers)); }
    function saveProducts() { localStorage.setItem("products", JSON.stringify(products)); }
    function saveWithdraw() { localStorage.setItem("withdraw_requests", JSON.stringify(withdrawRequests)); }
    function saveProductCards() { localStorage.setItem("product_cards", JSON.stringify(productCards)); }
    function saveComplaints() { localStorage.setItem("complaints", JSON.stringify(complaints)); }
    function saveInviteCodes() { localStorage.setItem("invite_codes", JSON.stringify(inviteCodes)); }

    // 邀请码
    function generateInviteCode() {
        let code = currentUser.username + "_" + Math.random().toString(36).substring(2,8).toUpperCase();
        inviteCodes.push({ code, owner: currentUser.username, used: false, usedBy: null, createdAt: new Date().toLocaleString() });
        saveInviteCodes();
        renderInviteInfo();
        alert("邀请码已生成：" + code);
    }
    function renderInviteInfo() {
        let myCodes = inviteCodes.filter(c => c.owner === currentUser.username);
        let activeCode = myCodes.find(c => !c.used);
        document.getElementById("myInviteCode").innerHTML = activeCode ? activeCode.code : "暂无可用，请生成";
        window.currentInviteCode = activeCode ? activeCode.code : null;
        let records = myCodes.filter(c => c.used).map(c => `<div class="product-item">🎉 邀请: ${c.usedBy} | +20积分 | ${c.createdAt}</div>`).join("");
        document.getElementById("inviteRecords").innerHTML = records || "暂无";
    }
    function copyInviteCode() { if(window.currentInviteCode) { navigator.clipboard.writeText(window.currentInviteCode); alert("已复制"); } else alert("请先生成邀请码"); }

    // 注册（含邀请码）
    function sendVerifyCode() { let code = Math.floor(100000+Math.random()*900000); sentCode = code; alert(`【演示】验证码：${code}`); }
    document.getElementById("sendCodeBtn").onclick = sendVerifyCode;
    document.getElementById("registerBtn").onclick = () => {
        let username = document.getElementById("regUsername").value;
        let email = document.getElementById("regEmail").value;
        let phone = document.getElementById("regPhone").value;
        let pwd = document.getElementById("regPass").value;
        let code = document.getElementById("regCode").value;
        let inviteCode = document.getElementById("regInviteCode").value;
        if(!username || !pwd) return alert("用户名和密码必填");
        if(parseInt(code) !== sentCode) return alert("验证码错误");
        if(allUsers.find(u=>u.username===username)) return alert("用户名已存在");
        let newUser = { id:Date.now(), username, password:pwd, email, phone, balance:0, sites:[], orders:[], role:"user", securityQuestion:"你最喜欢什么颜色？", securityAnswer:"蓝色" };
        if(inviteCode) {
            let invite = inviteCodes.find(c => c.code === inviteCode && !c.used);
            if(!invite) return alert("邀请码无效");
            newUser.balance += 20;
            invite.used = true; invite.usedBy = username;
            let owner = allUsers.find(u => u.username === invite.owner);
            if(owner) { owner.balance += 20; owner.orders = owner.orders || []; owner.orders.unshift({ id:Date.now(), type:"邀请奖励", amount:20, status:"成功", detail:`邀请 ${username}`, time:new Date().toLocaleString() }); }
            saveInviteCodes();
            alert("使用邀请码注册成功！双方各得20积分");
        }
        allUsers.push(newUser); saveAll();
        alert("注册成功，请登录");
        document.getElementById("registerPanel").classList.add("hidden");
        document.getElementById("authPanel").classList.remove("hidden");
    };

    // 商品相关函数
    function getProductLink(id) { return location.origin+location.pathname+"?action=buy&id="+id; }
    function copyToClipboard(text){ navigator.clipboard.writeText(text); alert("已复制"); }
    function buyProduct(p,qty){
        let total=p.price*qty;
        if(currentUser.balance<total) return alert("余额不足");
        if(p.stock<qty) return alert("库存不足");
        let seller=allUsers.find(u=>u.username===p.seller);
        if(!seller) return alert("卖家不存在");
        p.stock-=qty; p.sales=(p.sales||0)+qty;
        currentUser.balance-=total; seller.balance+=total;
        saveAll(); saveProducts();
        if(p.type==="card"){
            let cards=p.cards.split("\n").filter(c=>c.trim());
            let bought=cards.splice(0,qty);
            p.cards=cards.join("\n");
            saveProducts();
            alert(`购买成功！卡密：\n${bought.join("\n")}`);
        } else alert(`购买成功！请联系卖家：${p.contact||"未设置"}`);
        renderProductList(); renderMyProducts(); renderUserPanel();
    }
    function showBuyModal(p){ let qty=prompt(`购买 ${p.name} 价格¥${p.price} 库存${p.stock} 数量:`,"1"); if(qty) buyProduct(p,parseInt(qty)); }
    function renderProductList(){
        let activeProducts=products.filter(p=>p.status==="active"&&p.stock>0);
        let html=activeProducts.map(p=>`<div class="product-item"><div><strong>${p.name}</strong><br>¥${p.price} | 库存${p.stock}<br>卖家${p.seller}</div><button onclick='showBuyModal(${JSON.stringify(p)})'>购买</button><button class="copy-btn" onclick='copyToClipboard("${getProductLink(p.id)}")'>复制链接</button></div>`).join("");
        document.getElementById("productList").innerHTML=html||"暂无商品";
    }
    function renderMyProducts(){
        let my=products.filter(p=>p.seller===currentUser.username);
        let html=my.map(p=>`<div class="product-item"><div><strong>${p.name}</strong> ¥${p.price} 库存${p.stock} 销量${p.sales||0}</div><button onclick="deleteProduct(${p.id})">删除</button><button class="copy-btn" onclick='copyToClipboard("${getProductLink(p.id)}")'>链接</button></div>`).join("");
        document.getElementById("myProductsList").innerHTML=html||"暂无";
    }
    function deleteProduct(id){ if(confirm("删除?")){ products=products.filter(p=>p.id!==id); saveProducts(); renderMyProducts(); renderProductList(); } }
    function createProduct(n,p,s,type,cards,contact){ products.push({ id:Date.now(), name:n, price:p, stock:s, type, cards:cards||"", contact:contact||"", seller:currentUser.username, sales:0, status:"active" }); saveProducts(); renderMyProducts(); renderProductList(); }

    // 站点相关
    let packages=[{id:1,name:"经济套餐",price:20,days:30},{id:2,name:"专业套餐",price:35,days:90},{id:3,name:"旗舰套餐",price:50,days:365}];
    function createSite(user,name,sub,source,pkgId){
        let pkg=packages.find(p=>p.id==pkgId);
        if(user.balance<pkg.price) return alert(`余额不足，需¥${pkg.price}`);
        user.balance-=pkg.price;
        let domain=sub?`${sub}.userpage.com`:`site${Date.now()}.userpage.com`;
        let siteId=Date.now();
        let sitesData=JSON.parse(localStorage.getItem("user_sites_content")||"{}");
        sitesData[siteId]={ userId:user.id, name, domain, source, time:new Date().toLocaleString() };
        localStorage.setItem("user_sites_content",JSON.stringify(sitesData));
        user.sites=user.sites||[];
        user.sites.unshift({ id:siteId, name, domain, package:pkg.name, price:pkg.price });
        addOrder(user,"开通站点",pkg.price,`${pkg.name} · ${domain}`);
        saveAll();
        alert(`站点创建成功！域名：${domain} 剩余余额：¥${user.balance}`);
        renderSites(); renderUserPanel();
    }
    function renderSites(){
        let sitesData=JSON.parse(localStorage.getItem("user_sites_content")||"{}");
        let mySites=(currentUser.sites||[]).filter(s=>sitesData[s.id]?.userId===currentUser.id);
        let html=mySites.map(s=>`<div class="product-item"><div><strong>${s.name}</strong><br>${s.domain}<br>套餐${s.package}</div><button onclick="alert(decodeURIComponent('${encodeURIComponent(sitesData[s.id]?.source||"")}'))">查看源码</button></div>`).join("");
        document.getElementById("mySites").innerHTML=html||"暂无站点";
    }
    function addOrder(user,type,amount,detail){ user.orders=user.orders||[]; user.orders.unshift({ id:Date.now(), type, amount, status:"pending", detail, time:new Date().toLocaleString() }); saveAll(); }

    // 投诉
    function submitComplaint(content,contact){
        if(!content.trim()) return alert("请填写投诉内容");
        if(!contact.trim()) return alert("请填写联系方式");
        complaints.unshift({ id:Date.now(), content, contact, username:currentUser.username, status:"待处理", time:new Date().toLocaleString() });
        saveComplaints();
        renderMyComplaints();
        document.getElementById("complaintResult").innerHTML='<div class="success-box">✅ 投诉已提交</div>';
        setTimeout(()=>{ document.getElementById("complaintResult").innerHTML=''; },2000);
    }
    function renderMyComplaints(){
        let my=complaints.filter(c=>c.username===currentUser.username);
        let html=my.map(c=>`<div class="product-item"><strong>${c.content}</strong><br>📞${c.contact}<br>状态:${c.status}<br>${c.time}</div>`).join("");
        document.getElementById("myComplaints").innerHTML=html||"暂无";
    }

    // 充值/提现
    function addRechargeRequest(amount,proof){
        if(amount<=0) return alert("金额无效");
        let requests=JSON.parse(localStorage.getItem("recharge_requests")||"[]");
        requests.unshift({ id:Date.now(), username:currentUser.username, amount, proof:proof||null, status:"pending", time:new Date().toLocaleString() });
        localStorage.setItem("recharge_requests",JSON.stringify(requests));
        currentUser.orders=currentUser.orders||[];
        currentUser.orders.unshift({ id:Date.now(), type:"充值申请", amount, status:"pending", detail:`申请充值 ${amount} 元`, time:new Date().toLocaleString() });
        saveAll();
        alert("充值申请已提交，等待管理员审核");
    }
    function requestWithdraw(amount,account,image){
        if(amount<=0) return alert("金额无效");
        if(currentUser.balance<amount) return alert("余额不足");
        if(!account.trim()) return alert("请填写账号");
        currentUser.balance-=amount;
        withdrawRequests.unshift({ id:Date.now(), username:currentUser.username, amount, account, image:image||null, status:"pending", time:new Date().toLocaleString() });
        saveAll(); saveWithdraw();
        alert(`提现申请已提交 ¥${amount}`);
        renderUserPanel();
    }

    // 生成商品卡密（消耗余额）
    function generateProductCard(product,maxUses){
        if(!product) return alert("请选择商品");
        if(maxUses<=0) maxUses=1;
        if(currentUser.balance<product.price) return alert(`余额不足，需¥${product.price}`);
        currentUser.balance-=product.price;
        let code=`${Math.random().toString(36).substring(2,6).toUpperCase()}-${Math.random().toString(36).substring(2,6).toUpperCase()}-${Math.random().toString(36).substring(2,6).toUpperCase()}-${Math.random().toString(36).substring(2,6).toUpperCase()}`;
        productCards.push({ id:Date.now(), code, productId:product.id, productName:product.name, amount:product.price, maxUses, usedCount:0, status:"active", createdBy:currentUser.username, createdAt:new Date().toLocaleString(), type:product.type, contact:product.contact, cards:product.cards });
        saveAll(); saveProductCards();
        document.getElementById("genCardResult").innerHTML=`<div class="success-box">✅ 卡密：${code}<br>兑换商品:${product.name}<br><button class="copy-btn" onclick="copyToClipboard('${code}')">📋复制</button></div>`;
        renderUserPanel(); renderMyGeneratedCards();
    }
    function renderMyGeneratedCards(){
        let my=productCards.filter(c=>c.createdBy===currentUser.username);
        let html=my.map(c=>`<div class="product-item"><div>${c.productName}<br>卡密:${c.code}<br>剩余次数:${c.maxUses-c.usedCount}</div><button class="copy-btn" onclick="copyToClipboard('${c.code}')">📋复制</button></div>`).join("");
        document.getElementById("myGeneratedCards").innerHTML=html||"暂无";
    }
    function renderProductForCardSelect(){
        let active=products.filter(p=>p.status==="active");
        let options=active.map(p=>`<option value='${JSON.stringify(p)}'>${p.name} - ¥${p.price}</option>`).join("");
        document.getElementById("productForCard").innerHTML=options||"<option>暂无商品</option>";
        document.getElementById("genBalance").innerText="¥"+currentUser.balance;
    }

    // 通用
    function renderUserPanel(){ document.getElementById("balance").innerHTML="¥"+currentUser.balance; }
    function renderOrdersList(){
        let orders=(currentUser.orders||[]).slice(0,20);
        document.getElementById("ordersList").innerHTML=orders.map(o=>`<div class="product-item">💰${o.type} ¥${o.amount} ${o.status}<br>${o.detail}<br>${o.time}</div>`).join("")||"暂无";
    }
    
    // 登录/退出
    function doLogin(user){
        if(user.banned) return alert("账号已被封禁");
        currentUser=user;
        localStorage.setItem("currentUserId",user.id);
        document.getElementById("authPanel").classList.add("hidden");
        document.getElementById("mainPanel").classList.remove("hidden");
        renderUserPanel(); renderProductList(); renderOrdersList(); renderSites(); renderProductForCardSelect(); renderMyGeneratedCards(); renderMyComplaints(); renderInviteInfo();
    }
    function autoLogin(){
        let id=localStorage.getItem("currentUserId");
        if(id){ let u=allUsers.find(u=>u.id==parseInt(id)); if(u && !u.banned){ doLogin(u); return true; } }
        return false;
    }
    document.getElementById("loginBtn").onclick=()=>{
        let u=allUsers.find(u=>(u.username===document.getElementById("loginUser").value||u.email===document.getElementById("loginUser").value||u.phone===document.getElementById("loginUser").value)&&u.password===document.getElementById("loginPass").value);
        if(u && u.banned) alert("账号已被封禁");
        else if(u) doLogin(u);
        else alert("账号或密码错误");
    };
    document.getElementById("toRegisterBtn").onclick=()=>{ document.getElementById("authPanel").classList.add("hidden"); document.getElementById("registerPanel").classList.remove("hidden"); };
    document.getElementById("backToLoginBtn").onclick=()=>{ document.getElementById("registerPanel").classList.add("hidden"); document.getElementById("authPanel").classList.remove("hidden"); };
    document.getElementById("logoutBtn").onclick=()=>{ currentUser=null; localStorage.removeItem("currentUserId"); location.reload(); };
    document.getElementById("showInviteBtn").onclick=()=>document.querySelector(".tab-btn[data-tab='invite']").click();
    document.getElementById("generateInviteBtn")?.addEventListener("click",generateInviteCode);
    document.getElementById("copyInviteBtn")?.addEventListener("click",copyInviteCode);
    document.getElementById("createProductBtn").onclick=()=>{
        let n=prompt("商品名"), p=parseFloat(prompt("价格")), s=parseInt(prompt("库存")), t=prompt("类型 card/virtual/physical","card"), c=t==="card"?prompt("卡密(一行一个)"):"", ct=t!=="card"?prompt("联系方式"):"";
        if(n&&p) createProduct(n,p,s,t,c,ct);
    };
    document.getElementById("generateWebLockBtn").onclick=()=>{
        let src=document.getElementById("webSource").value, pwd=document.getElementById("lockPassword").value;
        if(!src||!pwd) return alert("填写完整");
        let locked=`<!DOCTYPE html><html><head><title>卡密锁</title><style>body{background:#0a0f1e;color:#0f0;}</style></head><body><div id="lock"><h2>🔒卡密锁</h2><input id="k" placeholder="卡密"><button onclick="if(document.getElementById('k').value==='${pwd}'){document.getElementById('lock').style.display='none';document.getElementById('content').style.display='block';}else alert('卡密错误')">验证</button></div><div id="content" style="display:none;">${src}</div></body></html>`;
        document.getElementById("webLockPreview").innerHTML=`<pre class="code-preview">${locked.replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}</pre>`;
        document.getElementById("copyWebLockBtn").classList.remove("hidden");
        window.currentWebLock=locked;
    };
    document.getElementById("copyWebLockBtn")?.addEventListener("click",()=>{ if(window.currentWebLock){ navigator.clipboard.writeText(window.currentWebLock); alert("已复制"); } });
    document.getElementById("createSiteBtn").onclick=()=>{
        let name=document.getElementById("siteName").value, sub=document.getElementById("subDomain").value, src=document.getElementById("siteSource").value;
        if(!name||!src) return alert("填写完整");
        createSite(currentUser,name,sub,src,1);
    };
    document.getElementById("showRechargeBtn").onclick=()=>{ document.getElementById("rechargeModal").classList.remove("hidden"); document.getElementById("modalOverlay").classList.remove("hidden"); };
    document.getElementById("closeRechargeBtn").onclick=()=>{ document.getElementById("rechargeModal").classList.add("hidden"); document.getElementById("modalOverlay").classList.add("hidden"); };
    document.getElementById("submitApplyBtn").onclick=()=>{
        let amt=parseFloat(document.getElementById("applyAmount").value), proof=document.getElementById("proofImage").files[0];
        if(amt>0) addRechargeRequest(amt, proof?await new Promise(r=>{let fr=new FileReader(); fr.onload=()=>r(fr.result); fr.readAsDataURL(proof);}):null);
        else alert("金额无效");
        document.getElementById("closeRechargeBtn").click();
    };
    document.getElementById("showWithdrawBtn").onclick=()=>{
        document.getElementById("withdrawBalance").innerText="¥"+currentUser.balance;
        document.getElementById("withdrawModal").classList.remove("hidden"); document.getElementById("modalOverlay").classList.remove("hidden");
    };
    document.getElementById("closeWithdrawBtn").onclick=()=>{ document.getElementById("withdrawModal").classList.add("hidden"); document.getElementById("modalOverlay").classList.add("hidden"); };
    document.getElementById("submitWithdrawBtn").onclick=()=>{
        let amt=parseFloat(document.getElementById("withdrawAmount").value), acc=document.getElementById("withdrawAccount").value;
        if(amt>0 && acc) requestWithdraw(amt,acc,null);
        else alert("填写完整");
        document.getElementById("closeWithdrawBtn").click();
    };
    document.getElementById("showCardBtn").onclick=()=>{ document.getElementById("cardModal").classList.remove("hidden"); document.getElementById("modalOverlay").classList.remove("hidden"); };
    document.getElementById("closeCardBtn").onclick=()=>{ document.getElementById("cardModal").classList.add("hidden"); document.getElementById("modalOverlay").classList.add("hidden"); };
    document.getElementById("redeemCardBtn").onclick=()=>{
        let code=document.getElementById("cardCode").value;
        let card=productCards.find(c=>c.code===code&&c.status==="active");
        if(!card) return alert("卡密无效");
        if(card.maxUses&&card.usedCount>=card.maxUses) return alert("已用完");
        card.usedCount++; if(card.maxUses&&card.usedCount>=card.maxUses) card.status="used";
        saveProductCards();
        if(card.amount) currentUser.balance+=card.amount;
        saveAll(); alert(`兑换成功 +${card.amount||0}元`);
        document.getElementById("closeCardBtn").click();
        renderUserPanel();
    };
    document.getElementById("genProductCardBtn").onclick=()=>{
        let selected=document.getElementById("productForCard").value, uses=parseInt(document.getElementById("cardUses").value)||1;
        if(!selected) return alert("请选择商品");
        generateProductCard(JSON.parse(selected),uses);
    };
    document.getElementById("showGenerateCardBtn").onclick=()=>document.querySelector(".tab-btn[data-tab='genCard']").click();
    document.getElementById("submitComplaintBtn").onclick=()=>{
        let content=document.getElementById("complaintContent").value, contact=document.getElementById("complaintContact").value;
        submitComplaint(content,contact);
        document.getElementById("complaintContent").value=""; document.getElementById("complaintContact").value="";
    };

    // 初始化
    if(allUsers.length===0) allUsers.push({ id:1, username:"test", password:"123", balance:500, sites:[], orders:[], role:"user" });
    saveAll();
    if(!autoLogin()) document.getElementById("authPanel").classList.remove("hidden");
</script>
</body>
</html>
