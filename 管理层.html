<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员版 · 封禁用户/代理商 + 卡密管理</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#0a0f1e;font-family:system-ui;padding:20px;color:#eef5ff;}
        .card{background:#10172b;border-radius:48px;padding:28px;margin-bottom:20px;border:1px solid #2a3550;}
        button{padding:8px 20px;border-radius:60px;background:#3b82f6;color:white;border:none;cursor:pointer;}
        .danger{background:#8b0000;}
        .product-item,.report-item{background:#0e1625;border-radius:24px;padding:16px;margin-top:12px;}
        .flex-between{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}
        .hidden{display:none;}
        .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:20px;}
        .stat-card{background:#0a0f1e;border-radius:32px;padding:20px;text-align:center;}
        .stat-number{font-size:2rem;font-weight:bold;color:#6eff8e;}
        .preview-img{max-width:80px;border-radius:8px;margin-top:5px;cursor:pointer;}
        .copy-btn{background:#1f2a46;padding:4px 12px;width:auto;}
        .banned-tag{color:#ff6666;margin-left:8px;}
        .agent-tag{color:#6eff8e;margin-left:8px;}
        .select-ban{display:flex;gap:10px;margin-top:8px;}
        .select-ban select{padding:6px;border-radius:60px;background:#01040f;color:white;border:1px solid #2b3452;}
    </style>
</head>
<body>
<div id="loginPanel" class="card" style="max-width:400px;margin:0 auto;">
    <h2>👑 管理员登录</h2>
    <input type="password" id="adminPass" placeholder="密码">
    <button id="adminLoginBtn">登录</button>
    <div id="loginError" style="color:#ff6666;"></div>
</div>

<div id="mainPanel" class="hidden">
    <div class="stats">
        <div class="stat-card"><div class="stat-number" id="statUsers">0</div><div>总用户</div></div>
        <div class="stat-card"><div class="stat-number" id="statProducts">0</div><div>总商品</div></div>
        <div class="stat-card"><div class="stat-number" id="statCards">0</div><div>总卡密</div></div>
        <div class="stat-card"><div class="stat-number" id="statBalance">0</div><div>总余额</div></div>
    </div>

    <div class="card">
        <div class="flex-between"><h2>🛡️ 紧急守护</h2><span id="attackBadge" style="background:#1f7a1f;padding:4px 12px;border-radius:60px;">✅正常</span></div>
        <div class="flex-between" style="margin-top:16px;"><button id="enableLockBtn" class="danger">🔒锁定全平台</button><button id="disableLockBtn">🔓解除锁定</button></div>
    </div>

    <!-- 商品卡密管理 -->
    <div class="card">
        <div class="flex-between"><h2>🎫 商品卡密管理（生成/查看）</h2><button id="logoutBtn">退出</button></div>
        <div class="flex-between" style="margin-bottom:16px;">
            <select id="productForCard" style="flex:2;"></select>
            <input type="number" id="cardUses" placeholder="次数" value="1" style="width:100px;">
            <button id="genProductCardBtn">生成卡密</button>
        </div>
        <div id="allProductCards"></div>
    </div>

    <!-- 充值审核 -->
    <div class="card"><h2>💳 充值审核</h2><div id="rechargeList"></div></div>

    <!-- 提现审核 -->
    <div class="card"><h2>💸 提现审核</h2><div id="withdrawList"></div></div>

    <!-- 商品管理 -->
    <div class="card"><h2>📦 全平台商品</h2><div id="allProducts"></div></div>

    <!-- 举报处理（自动封禁卖家） -->
    <div class="card">
        <h2>🚨 举报处理（退款+封禁卖家）</h2>
        <div id="reportsList"></div>
    </div>

    <!-- 用户/代理商管理 -->
    <div class="card">
        <h2>👥 用户/代理商管理（封禁/解封/设代理）</h2>
        <input type="text" id="searchUser" placeholder="搜索用户名">
        <div id="userList"></div>
        <button id="resetDataBtn" class="danger" style="margin-top:16px;">重置数据</button>
    </div>
</div>

<script>
    const ADMIN_PASSWORD = "admin123";
    function loadAllUsers() { return JSON.parse(localStorage.getItem("all_users")) || []; }
    function saveAllUsers(u) { localStorage.setItem("all_users", JSON.stringify(u)); }
    function loadProducts() { return JSON.parse(localStorage.getItem("products")) || []; }
    function saveProducts(p) { localStorage.setItem("products", JSON.stringify(p)); }
    function loadWithdraw() { return JSON.parse(localStorage.getItem("withdraw_requests")) || []; }
    function saveWithdraw(w) { localStorage.setItem("withdraw_requests", JSON.stringify(w)); }
    function loadRecharge() { return JSON.parse(localStorage.getItem("recharge_requests") || "[]"); }
    function saveRecharge(r) { localStorage.setItem("recharge_requests", JSON.stringify(r)); }
    function loadProductCards() { return JSON.parse(localStorage.getItem("product_cards")) || []; }
    function saveProductCards(c) { localStorage.setItem("product_cards", JSON.stringify(c)); }

    // 生成商品卡密（管理员不消耗余额）
    function generateProductCard(product, maxUses) {
        if(!product) return alert("请选择商品");
        if(maxUses <= 0) maxUses = 1;
        
        let code = `${Math.random().toString(36).substring(2,6).toUpperCase()}-${Math.random().toString(36).substring(2,6).toUpperCase()}-${Math.random().toString(36).substring(2,6).toUpperCase()}-${Math.random().toString(36).substring(2,6).toUpperCase()}`;
        
        let cards = loadProductCards();
        cards.push({
            id: Date.now(),
            code: code,
            productId: product.id,
            productName: product.name,
            amount: product.price,
            maxUses: maxUses,
            usedCount: 0,
            status: "active",
            createdBy: "admin",
            createdAt: new Date().toLocaleString(),
            type: product.type,
            contact: product.contact,
            cards: product.cards
        });
        saveProductCards(cards);
        alert(`✅ 卡密生成成功！\n${code}\n商品: ${product.name}\n可用次数: ${maxUses}`);
        renderAllProductCards();
        updateStats();
        return true;
    }
    
    function renderAllProductCards() {
        let cards = loadProductCards();
        let html = cards.map(c => `
            <div class="product-item">
                <div>
                    <strong>${c.productName}</strong><br>
                    卡密: ${c.code}<br>
                    面额: ¥${c.amount} | 剩余次数: ${c.maxUses - c.usedCount}<br>
                    状态: ${c.status === "active" ? "✅ 有效" : "❌ 已用完"}<br>
                    生成者: ${c.createdBy} | 时间: ${c.createdAt}
                </div>
                <div>
                    <button class="copy-btn" onclick="copyToClipboard('${c.code}')">📋 复制</button>
                </div>
            </div>
        `).join("");
        document.getElementById("allProductCards").innerHTML = html || "暂无卡密";
    }
    
    function renderProductForCardSelect() {
        let products = loadProducts();
        let options = products.filter(p=>p.status==="active").map(p => `<option value='${JSON.stringify(p)}'>${p.name} - ¥${p.price}</option>`).join("");
        document.getElementById("productForCard").innerHTML = options || "<option>暂无商品</option>";
    }

    // 举报处理：退款 + 封禁卖家
    function processRefundAndBan(reportId, productId, sellerName, buyerName, amount) {
        if(!confirm(`确认处理此举报？\n将退款 ¥${amount} 给 ${buyerName}\n封禁卖家 ${sellerName}`)) return;
        let users = loadAllUsers();
        let buyer = users.find(u => u.username === buyerName);
        let seller = users.find(u => u.username === sellerName);
        if(buyer && seller) {
            if(seller.balance >= amount) { seller.balance -= amount; buyer.balance += amount; }
            else { buyer.balance += seller.balance; seller.balance = 0; }
            seller.banned = true;
            seller.banType = "both"; // 封禁所有权限
            let products = loadProducts();
            products.forEach(p => { if(p.seller === sellerName) p.status = "banned"; });
            saveProducts(products);
            saveAllUsers(users);
            let reports = JSON.parse(localStorage.getItem("product_reports") || "[]");
            let report = reports.find(r => r.id === reportId);
            if(report) { report.status = "resolved"; localStorage.setItem("product_reports", JSON.stringify(reports)); }
            alert(`✅ 已处理！退款 ¥${amount} 给 ${buyerName}，卖家 ${sellerName} 已封禁`);
            renderReports(); renderProducts(); renderUserList(); updateStats();
        }
    }
    
    function rejectReport(reportId) {
        if(!confirm("驳回举报？")) return;
        let reports = JSON.parse(localStorage.getItem("product_reports") || "[]");
        let report = reports.find(r => r.id === reportId);
        if(report) { report.status = "rejected"; localStorage.setItem("product_reports", JSON.stringify(reports)); alert("已驳回"); renderReports(); }
    }
    
    function renderReports() {
        let reports = JSON.parse(localStorage.getItem("product_reports") || "[]");
        let pending = reports.filter(r => r.status === "pending");
        let html = pending.map(r => {
            let products = loadProducts();
            let product = products.find(p => p.id === r.productId);
            let amount = product ? product.price : 0;
            return `<div class="report-item"><div><strong>商品：${r.productName}</strong><br>卖家：${r.seller}<br>举报人：${r.reporter}<br>原因：${r.reason}<br>时间：${r.time}</div><div class="flex-between" style="margin-top:12px;"><button onclick='processRefundAndBan(${r.id}, ${r.productId}, "${r.seller}", "${r.reporter}", ${amount})'>🔨 退款+封禁卖家</button><button onclick='rejectReport(${r.id})'>❌ 驳回</button></div></div>`;
        }).join("");
        document.getElementById("reportsList").innerHTML = pending.length ? html : "<div>暂无待处理举报</div>";
    }
    
    function copyToClipboard(text) { navigator.clipboard.writeText(text); alert("✅ 已复制"); }

    function renderRecharge() {
        let reqs = loadRecharge();
        let html = reqs.filter(r=>r.status==="pending").map(r=>`<div class="product-item"><div><strong>${r.username}</strong><br>💰 ¥${r.amount}<br>${r.time}${r.proof?`<br><img src="${r.proof}" class="preview-img" onclick="window.open(this.src)">`:""}</div><button onclick="approveRecharge(${r.id}, '${r.username}', ${r.amount})">✅ 确认到账</button><button onclick="rejectRecharge(${r.id})">❌ 驳回</button></div>`).join("");
        document.getElementById("rechargeList").innerHTML = html || "无待处理充值";
    }
    window.approveRecharge = (id, username, amount) => {
        let users = loadAllUsers(); let user = users.find(u=>u.username===username);
        if(user) { user.balance += amount; saveAllUsers(users); }
        let reqs = loadRecharge(); reqs = reqs.filter(r=>r.id!==id); saveRecharge(reqs);
        renderRecharge(); updateStats(); renderUserList();
    };
    window.rejectRecharge = (id) => { let reqs = loadRecharge(); reqs = reqs.filter(r=>r.id!==id); saveRecharge(reqs); renderRecharge(); };

    function renderWithdraw() {
        let reqs = loadWithdraw();
        let html = reqs.filter(r=>r.status==="pending").map(r=>`<div class="product-item"><div><strong>${r.username}</strong><br>💰 ¥${r.amount}<br>📱${r.account}<br>${r.time}${r.image?`<br><img src="${r.image}" class="preview-img" onclick="window.open(this.src)">`:""}</div><button onclick="approveWithdraw(${r.id})">✅打款</button><button onclick="rejectWithdraw(${r.id})">❌驳回</button></div>`).join("");
        document.getElementById("withdrawList").innerHTML = html || "无待处理提现";
    }
    window.approveWithdraw = (id)=>{ let reqs=loadWithdraw(); let req=reqs.find(r=>r.id===id); if(req){ req.status="success"; saveWithdraw(reqs); renderWithdraw(); alert(`已确认打款¥${req.amount}给${req.username}`); } };
    window.rejectWithdraw = (id)=>{ let reqs=loadWithdraw(); let idx=reqs.findIndex(r=>r.id===id); if(idx!==-1){ let req=reqs[idx]; let users=loadAllUsers(); let user=users.find(u=>u.username===req.username); if(user) user.balance+=req.amount; reqs.splice(idx,1); saveAllUsers(users); saveWithdraw(reqs); renderWithdraw(); updateStats(); alert("已驳回，金额已退回用户余额"); } };

    function renderProducts() { let p=loadProducts(); document.getElementById("allProducts").innerHTML=p.map(pr=>`<div class="product-item"><div><strong>${pr.name}</strong><br>💰¥${pr.price}|库存${pr.stock}|销量${pr.sales||0}<br>卖家${pr.seller}${pr.status==="banned"?' <span class="banned-tag">[已封禁]</span>':''}</div><button onclick="deleteProduct(${pr.id})">下架</button></div>`).join("")||"暂无"; }
    window.deleteProduct=(id)=>{ let p=loadProducts(); saveProducts(p.filter(pr=>pr.id!==id)); renderProducts(); updateStats(); };
    
    // 封禁类型选择
    function banUser(username, banType) {
        let users = loadAllUsers();
        let user = users.find(u => u.username === username);
        if(!user) return alert("用户不存在");
        if(user.role === "admin") return alert("不能封禁管理员");
        if(banType === "agent" && user.role !== "agent") return alert("该用户不是代理商，无法封禁代理商权限");
        
        let confirmMsg = "";
        if(banType === "user") confirmMsg = `确认封禁 ${username} 的用户权限？\n封禁后无法登录、无法购买、无法发布商品`;
        else if(banType === "agent") confirmMsg = `确认封禁 ${username} 的代理商权限？\n封禁后无法使用代理商后台`;
        else confirmMsg = `确认封禁 ${username} 的全部权限？`;
        
        if(!confirm(confirmMsg)) return;
        
        if(banType === "user") {
            user.banned = true;
            user.banType = "user";
        } else if(banType === "agent") {
            user.agentBanned = true;
            user.banType = "agent";
        } else {
            user.banned = true;
            user.agentBanned = true;
            user.banType = "both";
        }
        
        // 下架该用户的所有商品
        let products = loadProducts();
        products.forEach(p => { if(p.seller === username) p.status = "banned"; });
        saveProducts(products);
        saveAllUsers(users);
        alert(`${username} 已封禁 (${banType === "user" ? "用户权限" : banType === "agent" ? "代理商权限" : "全部权限"})`);
        renderUserList();
        renderProducts();
        updateStats();
    }
    
    function unbanUser(username, unbanType) {
        let users = loadAllUsers();
        let user = users.find(u => u.username === username);
        if(!user) return alert("用户不存在");
        
        let confirmMsg = "";
        if(unbanType === "user") confirmMsg = `确认解封 ${username} 的用户权限？`;
        else if(unbanType === "agent") confirmMsg = `确认解封 ${username} 的代理商权限？`;
        else confirmMsg = `确认解封 ${username} 的全部权限？`;
        
        if(!confirm(confirmMsg)) return;
        
        if(unbanType === "user") {
            user.banned = false;
            if(user.banType === "user") user.banType = null;
        } else if(unbanType === "agent") {
            user.agentBanned = false;
            if(user.banType === "agent") user.banType = null;
        } else {
            user.banned = false;
            user.agentBanned = false;
            user.banType = null;
        }
        
        saveAllUsers(users);
        alert(`${username} 已解封 (${unbanType === "user" ? "用户权限" : unbanType === "agent" ? "代理商权限" : "全部权限"})`);
        renderUserList();
        updateStats();
    }
    
    function grantAgent(username) {
        let users = loadAllUsers();
        let user = users.find(u => u.username === username);
        if(!user) return alert("用户不存在");
        if(user.role === "admin") return alert("不能修改管理员");
        if(user.banned) return alert("该用户已被封禁，请先解封");
        if(user.role === "agent") {
            alert(`${username} 已经是代理商`);
            return;
        }
        user.role = "agent";
        saveAllUsers(users);
        alert(`${username} 已成为代理商`);
        renderUserList();
    }
    
    function revokeAgent(username) {
        let users = loadAllUsers();
        let user = users.find(u => u.username === username);
        if(!user) return alert("用户不存在");
        if(user.role !== "agent") return alert(`${username} 不是代理商`);
        user.role = "user";
        saveAllUsers(users);
        alert(`${username} 已取消代理商资格`);
        renderUserList();
    }
    
    function setBalance(username) {
        let users = loadAllUsers();
        let user = users.find(u => u.username === username);
        if(!user) return alert("用户不存在");
        let amt = prompt(`当前余额 ${user.balance}，输入新余额`);
        if(amt !== null && !isNaN(parseFloat(amt))) {
            user.balance = parseFloat(amt);
            saveAllUsers(users);
            renderUserList();
            updateStats();
        }
    }
    
    function renderUserList() {
        let users = loadAllUsers();
        let keyword = document.getElementById("searchUser")?.value.toLowerCase() || "";
        let filtered = users.filter(u => u.username !== "admin" && u.username.toLowerCase().includes(keyword));
        let html = filtered.map(u => `
            <div class="product-item">
                <div>
                    <strong>${u.username}</strong>
                    ${u.role === "agent" ? '<span class="agent-tag">[代理商]</span>' : ''}
                    ${u.banned ? '<span class="banned-tag">[用户权限已封禁]</span>' : ''}
                    ${u.agentBanned ? '<span class="banned-tag">[代理商权限已封禁]</span>' : ''}
                    <br>余额: ¥${u.balance} | 密码: ${u.password}
                </div>
                <div>
                    <div class="select-ban">
                        <select id="banType_${u.id}">
                            <option value="user">封禁用户权限</option>
                            ${u.role === "agent" ? '<option value="agent">封禁代理商权限</option>' : ''}
                            <option value="both">封禁全部权限</option>
                        </select>
                        <button class="danger" onclick="banUser('${u.username}', document.getElementById('banType_${u.id}').value)">执行封禁</button>
                    </div>
                    <div class="flex-between" style="margin-top:8px;">
                        ${u.banned || u.agentBanned ? `
                            <div class="select-ban">
                                <select id="unbanType_${u.id}">
                                    <option value="user">解封用户权限</option>
                                    ${u.agentBanned ? '<option value="agent">解封代理商权限</option>' : ''}
                                    ${(u.banned && u.agentBanned) ? '<option value="both">解封全部</option>' : ''}
                                </select>
                                <button onclick="unbanUser('${u.username}', document.getElementById('unbanType_${u.id}').value)">执行解封</button>
                            </div>
                        ` : ''}
                        ${u.role !== "agent" ? `<button onclick="grantAgent('${u.username}')">设为代理商</button>` : `<button onclick="revokeAgent('${u.username}')">取消代理商</button>`}
                        <button onclick="setBalance('${u.username}')">修改余额</button>
                    </div>
                </div>
            </div>
        `).join("");
        document.getElementById("userList").innerHTML = html || "暂无用户";
    }
    
    function updateStats() { let u=loadAllUsers(), p=loadProducts(), c=loadProductCards(); document.getElementById("statUsers").innerText=u.length-1; document.getElementById("statProducts").innerText=p.length; document.getElementById("statCards").innerText=c.length; document.getElementById("statBalance").innerText="¥"+u.reduce((s,uu)=>s+(uu.balance||0),0); }
    function resetData() { localStorage.clear(); location.reload(); }
    
    document.getElementById("genProductCardBtn").onclick = () => {
        let selected = document.getElementById("productForCard").value;
        let uses = parseInt(document.getElementById("cardUses").value) || 1;
        if(!selected) return alert("请选择商品");
        let product = JSON.parse(selected);
        generateProductCard(product, uses);
    };
    document.getElementById("resetDataBtn").onclick=()=>{ if(confirm("重置所有数据？")) resetData(); };
    document.getElementById("searchUser")?.addEventListener("input", renderUserList);
    document.getElementById("enableLockBtn").onclick=()=>{ localStorage.setItem("attack_mode","true"); location.reload(); };
    document.getElementById("disableLockBtn").onclick=()=>{ localStorage.setItem("attack_mode","false"); location.reload(); };
    
    function doLogin(){ localStorage.setItem("admin_logged_in","true"); document.getElementById("loginPanel").classList.add("hidden"); document.getElementById("mainPanel").classList.remove("hidden"); updateStats(); renderProducts(); renderRecharge(); renderWithdraw(); renderReports(); renderUserList(); renderProductForCardSelect(); renderAllProductCards(); }
    function autoLogin(){ if(localStorage.getItem("admin_logged_in")==="true"){ doLogin(); return true; } return false; }
    document.getElementById("adminLoginBtn").onclick=()=>{ if(document.getElementById("adminPass").value===ADMIN_PASSWORD) doLogin(); else document.getElementById("loginError").innerText="密码错误"; };
    document.getElementById("logoutBtn").onclick=()=>{ localStorage.removeItem("admin_logged_in"); location.reload(); };
    if(!autoLogin()) document.getElementById("loginPanel").classList.remove("hidden");
    
    window.copyToClipboard = copyToClipboard;
    window.processRefundAndBan = processRefundAndBan;
    window.rejectReport = rejectReport;
    window.banUser = banUser;
    window.unbanUser = unbanUser;
    window.grantAgent = grantAgent;
    window.revokeAgent = revokeAgent;
    window.setBalance = setBalance;
</script>
</body>
</html>
