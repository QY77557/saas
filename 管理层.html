<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>龙傲天 · 管理员版</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#f5f7fc;font-family:system-ui;padding:20px;color:#1a2c3e;}
        .card{background:#fff;border-radius:32px;padding:28px;margin-bottom:20px;box-shadow:0 2px 6px rgba(0,0,0,0.02);}
        button{padding:8px 20px;border-radius:60px;background:#1e6f3f;color:white;border:none;cursor:pointer;}
        .danger{background:#b91c1c;}
        .product-item{background:#f8fafc;border-radius:28px;padding:16px;margin-top:12px;}
        .flex-between{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;}
        .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:20px;}
        .stat-card{background:#fff;border-radius:32px;padding:20px;text-align:center;}
        .stat-number{font-size:2rem;font-weight:800;color:#1e6f3f;}
        .preview-img{max-width:80px;border-radius:8px;margin-top:5px;cursor:pointer;}
    </style>
</head>
<body>
<div id="loginPanel" class="card" style="max-width:400px;margin:0 auto;">
    <h2>👑 龙傲天 · 管理员登录</h2>
    <input type="password" id="adminPass" placeholder="密码" style="width:100%;padding:14px;border:1px solid #e2e8f0;border-radius:60px;">
    <button id="adminLoginBtn">登录</button>
    <div id="loginError" style="color:#b91c1c;"></div>
</div>

<div id="mainPanel" class="hidden">
    <div class="stats">
        <div class="stat-card"><div class="stat-number" id="statUsers">0</div><div>总用户</div></div>
        <div class="stat-card"><div class="stat-number" id="statProducts">0</div><div>总商品</div></div>
        <div class="stat-card"><div class="stat-number" id="statCards">0</div><div>总卡密</div></div>
        <div class="stat-card"><div class="stat-number" id="statBalance">0</div><div>总余额</div></div>
        <div class="stat-card"><div class="stat-number" id="statReports">0</div><div>待处理举报</div></div>
    </div>

    <div class="card">
        <div class="flex-between"><h2>🛡️ 紧急守护</h2><span id="attackBadge" style="background:#1f7a1f;padding:4px 12px;border-radius:60px;">✅正常</span></div>
        <div class="flex-between" style="margin-top:16px;"><button id="enableLockBtn" class="danger">🔒锁定全平台</button><button id="disableLockBtn">🔓解除锁定</button><button id="logoutBtn">退出</button></div>
    </div>

    <!-- 举报处理 -->
    <div class="card">
        <h2>🚨 举报处理（退款+封禁）</h2>
        <div id="reportsList"></div>
    </div>

    <!-- 生成代理商 -->
    <div class="card">
        <h2>🎁 生成代理商账号</h2>
        <div class="flex-between">
            <input type="text" id="newAgentName" placeholder="代理商用户名" style="flex:2;">
            <input type="text" id="newAgentPwd" placeholder="密码" value="123456" style="flex:1;">
            <button id="createAgentBtn">生成代理商</button>
        </div>
        <div id="agentCreateResult" style="margin-top:12px; display:none;"></div>
    </div>

    <div class="card"><h2>🎫 卡密管理</h2><select id="productForCard"></select><input type="number" id="cardUses" placeholder="次数"><button id="genProductCardBtn">生成卡密</button><div id="allProductCards"></div></div>
    <div class="card"><h2>💳 充值审核</h2><div id="rechargeList"></div></div>
    <div class="card"><h2>💸 提现审核</h2><div id="withdrawList"></div></div>
    <div class="card"><h2>📦 全平台商品</h2><div id="allProducts"></div></div>
    <div class="card"><h2>👥 用户管理</h2><input type="text" id="searchUser" placeholder="搜索用户"><div id="userList"></div><button id="resetDataBtn" class="danger">重置所有数据</button></div>
</div>

<script>
    const ADMIN_PASSWORD = "admin123";
    let allUsers = JSON.parse(localStorage.getItem("all_users")) || [];
    let products = JSON.parse(localStorage.getItem("products")) || [];
    let productCards = JSON.parse(localStorage.getItem("product_cards")) || [];
    let rechargeRequests = JSON.parse(localStorage.getItem("recharge_requests")) || [];
    let withdrawRequests = JSON.parse(localStorage.getItem("withdraw_requests")) || [];
    
    function saveAllUsers(u) { localStorage.setItem("all_users", JSON.stringify(u)); }
    function saveProducts(p) { localStorage.setItem("products", JSON.stringify(p)); }
    function saveProductCards(c) { localStorage.setItem("product_cards", JSON.stringify(c)); }
    function saveRecharge(r) { localStorage.setItem("recharge_requests", JSON.stringify(r)); }
    function saveWithdraw(w) { localStorage.setItem("withdraw_requests", JSON.stringify(w)); }

    function updateStats() {
        let u=loadAllUsers(), p=loadProducts(), c=loadProductCards();
        let reports = JSON.parse(localStorage.getItem("product_reports") || "[]");
        document.getElementById("statUsers").innerText=u.length;
        document.getElementById("statProducts").innerText=p.length;
        document.getElementById("statCards").innerText=c.length;
        document.getElementById("statBalance").innerText="¥"+u.reduce((s,u)=>s+(u.balance||0),0);
        document.getElementById("statReports").innerText=reports.filter(r=>r.status==="pending").length;
    }
    
    function loadAllUsers() { return allUsers; }
    function loadProducts() { return products; }
    function loadProductCards() { return productCards; }
    
    // 举报处理
    function processReport(reportId, productId, sellerName, buyerName, amount) {
        if(!confirm(`确认处理此举报？\n将退款 ¥${amount} 给 ${buyerName}\n封禁卖家 ${sellerName}`)) return;
        let users = loadAllUsers();
        let buyer = users.find(u => u.username === buyerName);
        let seller = users.find(u => u.username === sellerName);
        if(buyer && seller) {
            if(seller.balance >= amount) { seller.balance -= amount; buyer.balance += amount; }
            else { buyer.balance += seller.balance; seller.balance = 0; }
            seller.banned = true;
            let products = loadProducts();
            products.forEach(p => { if(p.seller === sellerName) p.status = "banned"; });
            saveProducts(products);
            saveAllUsers(users);
            let reports = JSON.parse(localStorage.getItem("product_reports") || "[]");
            let report = reports.find(r => r.id === reportId);
            if(report) { report.status = "resolved"; localStorage.setItem("product_reports", JSON.stringify(reports)); }
            alert(`✅ 已处理！退款 ¥${amount} 给 ${buyerName}，卖家 ${sellerName} 已封禁`);
            renderReports(); renderProducts(); renderUserList(); updateStats();
        }
    }
    
    function rejectReport(reportId) {
        if(!confirm("驳回举报？")) return;
        let reports = JSON.parse(localStorage.getItem("product_reports") || "[]");
        let report = reports.find(r => r.id === reportId);
        if(report) { report.status = "rejected"; localStorage.setItem("product_reports", JSON.stringify(reports)); alert("已驳回"); renderReports(); }
    }
    
    function renderReports() {
        let reports = JSON.parse(localStorage.getItem("product_reports") || "[]");
        let pending = reports.filter(r => r.status === "pending");
        let html = pending.map(r => {
            let products = loadProducts();
            let product = products.find(p => p.id === r.productId);
            let amount = product ? product.price : 0;
            return `<div class="product-item"><div><strong>商品：${r.productName}</strong><br>卖家：${r.seller}<br>举报人：${r.reporter}<br>原因：${r.reason}<br>时间：${r.time}</div><div class="flex-between" style="margin-top:12px;"><button class="danger" onclick='processReport(${r.id}, ${r.productId}, "${r.seller}", "${r.reporter}", ${amount})'>🔨 退款+封禁卖家</button><button onclick='rejectReport(${r.id})'>❌ 驳回</button></div></div>`;
        }).join("");
        document.getElementById("reportsList").innerHTML = pending.length ? html : "<div>暂无待处理举报</div>";
    }
    
    // 生成代理商
    function generateAgent() {
        let name = document.getElementById("newAgentName").value.trim();
        let pwd = document.getElementById("newAgentPwd").value.trim();
        if(!name) return alert("请输入代理商用户名");
        if(!pwd) return alert("请输入密码");
        if(allUsers.find(u => u.username === name)) return alert("用户名已存在");
        let newAgent = { id: Date.now(), username: name, password: pwd, balance: 0, sites: [], orders: [], role: "agent", banned: false };
        allUsers.push(newAgent);
        saveAllUsers(allUsers);
        document.getElementById("agentCreateResult").innerHTML = `<div style="background:#e6f7ec;border-radius:24px;padding:16px;">✅ 代理商 ${name} 创建成功（密码：${pwd}）</div>`;
        document.getElementById("agentCreateResult").style.display = "block";
        setTimeout(()=>{ document.getElementById("agentCreateResult").style.display = "none"; }, 3000);
        renderUserList();
        updateStats();
    }
    
    function renderProducts() { let p=loadProducts(); document.getElementById("allProducts").innerHTML=p.map(pr=>`<div class="product-item"><div><strong>${pr.name}</strong><br>💰¥${pr.price}|库存${pr.stock}|销量${pr.sales||0}<br>卖家${pr.seller}${pr.status==="banned"?' <span style="color:#ff6666;">[已封禁]</span>':''}</div><button onclick="deleteProduct(${pr.id})">下架</button></div>`).join("")||"暂无"; }
    window.deleteProduct=(id)=>{ let p=loadProducts(); saveProducts(p.filter(pr=>pr.id!==id)); renderProducts(); updateStats(); };
    
    function renderRecharge() {
        let reqs = rechargeRequests;
        let html = reqs.filter(r=>r.status==="pending").map(r=>`<div class="product-item"><div><strong>${r.username}</strong><br>💰 ¥${r.amount}<br>${r.time}${r.proof?`<br><img src="${r.proof}" class="preview-img" onclick="window.open(this.src)">`:""}</div><button onclick="approveRecharge(${r.id}, '${r.username}', ${r.amount})">✅ 确认到账</button><button onclick="rejectRecharge(${r.id})">❌ 驳回</button></div>`).join("");
        document.getElementById("rechargeList").innerHTML = html || "无待处理充值";
    }
    window.approveRecharge = (id, username, amount) => {
        let user = allUsers.find(u=>u.username===username);
        if(user) { user.balance += amount; saveAllUsers(allUsers); }
        rechargeRequests = rechargeRequests.filter(r=>r.id!==id);
        saveRecharge(rechargeRequests);
        renderRecharge(); renderUserList(); updateStats();
    };
    window.rejectRecharge = (id)=>{ rechargeRequests=rechargeRequests.filter(r=>r.id!==id); saveRecharge(rechargeRequests); renderRecharge(); };
    
    function renderWithdraw() {
        let reqs = withdrawRequests;
        let html = reqs.filter(r=>r.status==="pending").map(r=>`<div class="product-item"><div><strong>${r.username}</strong><br>💰 ¥${r.amount}<br>📱${r.account}<br>${r.time}${r.image?`<br><img src="${r.image}" class="preview-img" onclick="window.open(this.src)">`:""}</div><button onclick="approveWithdraw(${r.id})">✅打款</button><button onclick="rejectWithdraw(${r.id})">❌驳回</button></div>`).join("");
        document.getElementById("withdrawList").innerHTML = html || "无待处理提现";
    }
    window.approveWithdraw = (id)=>{ withdrawRequests=withdrawRequests.filter(w=>w.id!==id); saveWithdraw(withdrawRequests); renderWithdraw(); alert("已打款"); };
    window.rejectWithdraw = (id)=>{ let w=withdrawRequests.find(w=>w.id===id); if(w){ let user=allUsers.find(u=>u.username===w.username); if(user) user.balance+=w.amount; withdrawRequests=withdrawRequests.filter(w=>w.id!==id); saveWithdraw(withdrawRequests); saveAllUsers(allUsers); renderWithdraw(); renderUserList(); updateStats(); alert("已驳回，金额已退回"); } };
    
    function generateCard() { let selected = document.getElementById("productForCard").value; if(!selected) return alert("请选商品"); let product = JSON.parse(selected); let uses = parseInt(document.getElementById("cardUses").value)||1; let code = `${Math.random().toString(36).substring(2,6).toUpperCase()}-${Math.random().toString(36).substring(2,6).toUpperCase()}-${Math.random().toString(36).substring(2,6).toUpperCase()}-${Math.random().toString(36).substring(2,6).toUpperCase()}`; productCards.push({ id:Date.now(), code, productId:product.id, productName:product.name, amount:product.price, maxUses:uses, usedCount:0, status:"active", createdBy:"admin" }); saveProductCards(productCards); renderCardList(); alert("卡密:"+code); }
    function renderCardList() { let c=loadProductCards(); document.getElementById("allProductCards").innerHTML=c.map(cd=>`<div class="product-item">🎫${cd.productName}<br>卡密:${cd.code}<br>剩余${cd.maxUses-cd.usedCount}次<button onclick="deleteCard(${cd.id})">删除</button></div>`).join("")||"暂无"; }
    window.deleteCard = (id)=>{ productCards=productCards.filter(c=>c.id!==id); saveProductCards(productCards); renderCardList(); };
    
    function renderUserList() {
        let users = loadAllUsers();
        let kw = document.getElementById("searchUser")?.value.toLowerCase() || "";
        let filtered = users.filter(u => u.username.toLowerCase().includes(kw) && u.role !== "admin");
        let html = filtered.map(u => `
            <div class="product-item">
                <div><strong>${u.username}</strong> | 余额 ¥${u.balance} | 密码 ${u.password} ${u.banned ? '[封禁]' : ''} ${u.role === "agent" ? '[代理商]' : ''}</div>
                <div>
                    <button onclick="toggleBan('${u.username}')">${u.banned ? "解封" : "封禁"}</button>
                    <button onclick="setBalance('${u.username}')">改余额</button>
                    ${u.role !== "agent" ? `<button onclick="grantAgent('${u.username}')">设为代理商</button>` : `<button onclick="revokeAgent('${u.username}')">取消代理商</button>`}
                </div>
            </div>
        `).join("");
        document.getElementById("userList").innerHTML = html || "暂无用户";
    }
    
    window.toggleBan = (username) => {
        let u = allUsers.find(u => u.username === username);
        if(u) { u.banned = !u.banned; saveAllUsers(allUsers); renderUserList(); updateStats(); alert(`${username}${u.banned ? "已封禁" : "已解封"}`); }
    };
    window.setBalance = (username) => {
        let amt = prompt("新余额");
        if(amt) { let u = allUsers.find(u => u.username === username); if(u) { u.balance = parseFloat(amt); saveAllUsers(allUsers); renderUserList(); updateStats(); } }
    };
    window.grantAgent = (username) => {
        let u = allUsers.find(u => u.username === username);
        if(u && u.role !== "agent") { u.role = "agent"; saveAllUsers(allUsers); renderUserList(); updateStats(); alert(`${username}已成为代理商`); }
        else alert("已是代理商或用户不存在");
    };
    window.revokeAgent = (username) => {
        let u = allUsers.find(u => u.username === username);
        if(u && u.role === "agent") { u.role = "user"; saveAllUsers(allUsers); renderUserList(); updateStats(); alert(`${username}已取消代理商资格`); }
        else alert("不是代理商");
    };
    
    function renderProductForCardSelect() {
        let options = products.filter(p=>p.status==="active").map(p=>`<option value='${JSON.stringify(p)}'>${p.name} - ¥${p.price}</option>`).join("");
        document.getElementById("productForCard").innerHTML = options;
    }
    
    function resetData() { localStorage.clear(); location.reload(); }
    
    document.getElementById("createAgentBtn").onclick = generateAgent;
    document.getElementById("genProductCardBtn").onclick = generateCard;
    document.getElementById("resetDataBtn").onclick = ()=>{ if(confirm("重置所有数据?")) resetData(); };
    document.getElementById("enableLockBtn").onclick = ()=>{ localStorage.setItem("attack_mode","true"); location.reload(); };
    document.getElementById("disableLockBtn").onclick = ()=>{ localStorage.setItem("attack_mode","false"); location.reload(); };
    document.getElementById("searchUser")?.addEventListener("input", renderUserList);
    
    function doLogin() { localStorage.setItem("admin_logged_in","true"); document.getElementById("loginPanel").classList.add("hidden"); document.getElementById("mainPanel").classList.remove("hidden"); updateStats(); renderProducts(); renderCardList(); renderRecharge(); renderWithdraw(); renderReports(); renderUserList(); renderProductForCardSelect(); }
    function autoLogin() { if(localStorage.getItem("admin_logged_in")==="true"){ doLogin(); return true; } return false; }
    document.getElementById("adminLoginBtn").onclick = ()=>{ if(document.getElementById("adminPass").value===ADMIN_PASSWORD) doLogin(); else document.getElementById("loginError").innerText="密码错误"; };
    document.getElementById("logoutBtn").onclick = ()=>{ localStorage.removeItem("admin_logged_in"); location.reload(); };
    if(!autoLogin()) document.getElementById("loginPanel").classList.remove("hidden");
    
    window.processReport = processReport;
    window.rejectReport = rejectReport;
</script>
</body>
</html>
