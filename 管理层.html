<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龙傲天 · 管理员版（含代理商管理）</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#f5f7fc;font-family:system-ui;padding:20px;color:#1a2c3e;}
        .card{background:#fff;border-radius:32px;padding:28px;margin-bottom:20px;box-shadow:0 2px 6px rgba(0,0,0,0.02);}
        button{padding:8px 20px;border-radius:60px;background:#1e6f3f;color:white;border:none;cursor:pointer;}
        .danger{background:#b91c1c;}
        .product-item{background:#f8fafc;border-radius:28px;padding:16px;margin-top:12px;}
        .flex-between{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;}
        .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:20px;}
        .stat-card{background:#fff;border-radius:32px;padding:20px;text-align:center;}
        .stat-number{font-size:2rem;font-weight:800;color:#1e6f3f;}
        .success-box{background:#e6f7ec;border-radius:24px;padding:16px;margin-top:12px;color:#1e6f3f;}
        .agent-tag{background:#1e6f3f20;color:#1e6f3f;padding:2px 10px;border-radius:60px;font-size:0.7rem;}
    </style>
</head>
<body>
<div id="loginPanel" class="card" style="max-width:400px;margin:0 auto;">
    <h2>👑 龙傲天 · 管理员登录</h2>
    <input type="password" id="adminPass" placeholder="密码" style="width:100%;padding:14px;border:1px solid #e2e8f0;border-radius:60px;">
    <button id="adminLoginBtn">登录</button>
    <div id="loginError" style="color:#b91c1c;"></div>
</div>

<div id="mainPanel" class="hidden">
    <div class="stats">
        <div class="stat-card"><div class="stat-number" id="statUsers">0</div><div>总用户</div></div>
        <div class="stat-card"><div class="stat-number" id="statProducts">0</div><div>总商品</div></div>
        <div class="stat-card"><div class="stat-number" id="statCards">0</div><div>总卡密</div></div>
        <div class="stat-card"><div class="stat-number" id="statBalance">0</div><div>总余额</div></div>
        <div class="stat-card"><div class="stat-number" id="statComplaints">0</div><div>投诉反馈</div></div>
    </div>

    <div class="card"><div class="flex-between"><h2>🛡️ 紧急守护</h2><span id="attackBadge">✅正常</span><button id="enableLockBtn" class="danger">锁定平台</button><button id="disableLockBtn">解除锁定</button><button id="logoutBtn">退出</button></div></div>

    <!-- 代理商管理（核心新增） -->
    <div class="card">
        <h2>👥 代理商管理（查看 / 设为代理商 / 取消资格）</h2>
        <input type="text" id="searchAgent" placeholder="搜索代理商用户名" style="margin-bottom:12px;">
        <div id="agentList"></div>
    </div>

    <!-- 生成代理商账号（可选） -->
    <div class="card">
        <h2>🎁 生成代理商账号</h2>
        <div class="flex-between">
            <input type="text" id="newAgentName" placeholder="代理商用户名" style="flex:2;">
            <input type="text" id="newAgentPwd" placeholder="密码" value="123456" style="flex:1;">
            <button id="createAgentBtn">生成代理商</button>
        </div>
        <div id="agentCreateResult" class="success-box" style="margin-top:12px; display:none;"></div>
    </div>

    <div class="card"><h2>🎫 卡密管理</h2><select id="productForCard"></select><input type="number" id="cardUses" placeholder="次数"><button id="genProductCardBtn">生成卡密</button><div id="allProductCards"></div></div>
    <div class="card"><h2>💳 充值审核</h2><div id="rechargeList"></div></div>
    <div class="card"><h2>💸 提现审核</h2><div id="withdrawList"></div></div>
    <div class="card"><h2>📦 全平台商品</h2><div id="allProducts"></div></div>
    <div class="card"><h2>👥 全部用户管理</h2><input type="text" id="searchUser" placeholder="搜索用户"><div id="userList"></div><button id="resetDataBtn" class="danger">重置所有数据</button></div>
</div>

<script>
    const ADMIN_PASSWORD = "admin123";
    let allUsers = JSON.parse(localStorage.getItem("all_users")) || [];
    let products = JSON.parse(localStorage.getItem("products")) || [];
    let productCards = JSON.parse(localStorage.getItem("product_cards")) || [];
    let rechargeRequests = JSON.parse(localStorage.getItem("recharge_requests")) || [];
    let withdrawRequests = JSON.parse(localStorage.getItem("withdraw_requests")) || [];
    let complaints = JSON.parse(localStorage.getItem("complaints")) || [];

    function saveAllUsers(u) { localStorage.setItem("all_users", JSON.stringify(u)); }
    function saveProducts(p) { localStorage.setItem("products", JSON.stringify(p)); }
    function saveProductCards(c) { localStorage.setItem("product_cards", JSON.stringify(c)); }
    function saveRecharge(r) { localStorage.setItem("recharge_requests", JSON.stringify(r)); }
    function saveWithdraw(w) { localStorage.setItem("withdraw_requests", JSON.stringify(w)); }
    function saveComplaints(c) { localStorage.setItem("complaints", JSON.stringify(c)); }

    function updateStats() {
        document.getElementById("statUsers").innerText = allUsers.length;
        document.getElementById("statProducts").innerText = products.length;
        document.getElementById("statCards").innerText = productCards.length;
        document.getElementById("statBalance").innerText = allUsers.reduce((s,u)=>s+(u.balance||0),0);
        document.getElementById("statComplaints").innerText = complaints.length;
    }

    // ========== 代理商管理核心 ==========
    function renderAgentList() {
        let keyword = document.getElementById("searchAgent")?.value.toLowerCase() || "";
        let agents = allUsers.filter(u => u.role === "agent" && u.username.toLowerCase().includes(keyword));
        if(agents.length === 0) {
            document.getElementById("agentList").innerHTML = "<div class='product-item'>暂无代理商</div>";
            return;
        }
        document.getElementById("agentList").innerHTML = agents.map(agent => `
            <div class="product-item">
                <div><strong>${agent.username}</strong> (代理商) | 余额 ¥${agent.balance} | 密码 ${agent.password}</div>
                <div><button class="danger" onclick="revokeAgent('${agent.username}')">取消代理商资格</button></div>
            </div>
        `).join("");
    }

    // 把普通用户设为代理商
    function grantAgent(username) {
        let user = allUsers.find(u => u.username === username);
        if(!user) return alert("用户不存在");
        if(user.role === "admin") return alert("不能把管理员设为代理商");
        if(user.role === "agent") return alert("已经是代理商");
        user.role = "agent";
        saveAllUsers(allUsers);
        alert(`${username} 已成为代理商`);
        renderAgentList();
        renderUserList();
        updateStats();
    }

    // 取消代理商资格（变回普通用户）
    function revokeAgent(username) {
        let user = allUsers.find(u => u.username === username);
        if(!user) return alert("用户不存在");
        if(user.role !== "agent") return alert("不是代理商");
        user.role = "user";
        saveAllUsers(allUsers);
        alert(`${username} 已被取消代理商资格`);
        renderAgentList();
        renderUserList();
        updateStats();
    }

    // 生成新代理商（单独功能）
    function generateAgent() {
        let name = document.getElementById("newAgentName").value.trim();
        let pwd = document.getElementById("newAgentPwd").value.trim();
        if(!name) return alert("请输入代理商用户名");
        if(!pwd) return alert("请输入密码");
        if(allUsers.find(u => u.username === name)) return alert("用户名已存在");
        let newAgent = { id: Date.now(), username: name, password: pwd, balance: 0, sites: [], orders: [], role: "agent", banned: false };
        allUsers.push(newAgent);
        saveAllUsers(allUsers);
        document.getElementById("agentCreateResult").innerHTML = `<div class="success-box">✅ 代理商 ${name} 创建成功（密码：${pwd}）</div>`;
        document.getElementById("agentCreateResult").style.display = "block";
        setTimeout(()=>{ document.getElementById("agentCreateResult").style.display = "none"; }, 3000);
        renderAgentList();
        renderUserList();
        updateStats();
    }

    // 普通用户列表（可设为代理商）
    function renderUserList() {
        let kw = document.getElementById("searchUser")?.value.toLowerCase() || "";
        let filtered = allUsers.filter(u => u.username.toLowerCase().includes(kw) && u.role !== "admin");
        document.getElementById("userList").innerHTML = filtered.map(u => `
            <div class="product-item">
                <div><strong>${u.username}</strong> | 余额 ¥${u.balance} | 密码 ${u.password} ${u.role === "agent" ? '<span class="agent-tag">[代理商]</span>' : ''} ${u.banned ? '[封禁]' : ''}</div>
                <div>
                    ${u.role !== "agent" ? `<button onclick="grantAgent('${u.username}')">设为代理商</button>` : `<button class="danger" onclick="revokeAgent('${u.username}')">取消代理商</button>`}
                    <button onclick="toggleBan('${u.username}')">${u.banned ? "解封" : "封禁"}</button>
                    <button onclick="setBalance('${u.username}')">改余额</button>
                </div>
            </div>
        `).join("");
    }

    // 封禁 / 解封
    window.toggleBan = (username) => {
        let u = allUsers.find(u => u.username === username);
        if(u) { u.banned = !u.banned; saveAllUsers(allUsers); renderUserList(); renderAgentList(); alert(`${username}${u.banned ? "已封禁" : "已解封"}`); }
    };
    window.setBalance = (username) => {
        let amt = prompt("新余额");
        if(amt) { let u = allUsers.find(u => u.username === username); if(u) { u.balance = parseFloat(amt); saveAllUsers(allUsers); renderUserList(); renderAgentList(); updateStats(); } }
    };

    // 商品、卡密、审核等已有功能
    function renderProducts() { document.getElementById("allProducts").innerHTML = products.map(p=>`<div class="product-item"><div><strong>${p.name}</strong> ¥${p.price} 卖家${p.seller}</div><button onclick="deleteProduct(${p.id})">下架</button></div>`).join("")||"暂无"; }
    window.deleteProduct = (id)=>{ products=products.filter(p=>p.id!==id); saveProducts(products); renderProducts(); updateStats(); };
    function renderRecharge() { document.getElementById("rechargeList").innerHTML = rechargeRequests.map(r=>`<div class="product-item">用户${r.username} 申请¥${r.amount}<button onclick="approveRecharge(${r.id})">到账</button><button onclick="rejectRecharge(${r.id})">驳回</button></div>`).join("")||"无"; }
    window.approveRecharge = (id)=>{ let req=rechargeRequests.find(r=>r.id===id); if(req){ let user=allUsers.find(u=>u.username===req.username); if(user) user.balance+=req.amount; rechargeRequests=rechargeRequests.filter(r=>r.id!==id); saveRecharge(rechargeRequests); saveAllUsers(allUsers); renderRecharge(); renderUserList(); renderAgentList(); updateStats(); alert("到账成功"); } };
    window.rejectRecharge = (id)=>{ rechargeRequests=rechargeRequests.filter(r=>r.id!==id); saveRecharge(rechargeRequests); renderRecharge(); };
    function renderWithdraw() { document.getElementById("withdrawList").innerHTML = withdrawRequests.map(w=>`<div class="product-item">用户${w.username} 提现¥${w.amount} 账号${w.account}<button onclick="approveWithdraw(${w.id})">打款</button><button onclick="rejectWithdraw(${w.id})">驳回</button></div>`).join("")||"无"; }
    window.approveWithdraw = (id)=>{ withdrawRequests=withdrawRequests.filter(w=>w.id!==id); saveWithdraw(withdrawRequests); renderWithdraw(); alert("已打款"); };
    window.rejectWithdraw = (id)=>{ let w=withdrawRequests.find(w=>w.id===id); if(w){ let user=allUsers.find(u=>u.username===w.username); if(user) user.balance+=w.amount; withdrawRequests=withdrawRequests.filter(w=>w.id!==id); saveWithdraw(withdrawRequests); saveAllUsers(allUsers); renderWithdraw(); renderUserList(); renderAgentList(); updateStats(); alert("已驳回，金额已退回"); } };
    function generateCard() { let selected = document.getElementById("productForCard").value; if(!selected) return alert("请选商品"); let product = JSON.parse(selected); let uses = parseInt(document.getElementById("cardUses").value)||1; let code = `${Math.random().toString(36).substring(2,6).toUpperCase()}-${Math.random().toString(36).substring(2,6).toUpperCase()}-${Math.random().toString(36).substring(2,6).toUpperCase()}-${Math.random().toString(36).substring(2,6).toUpperCase()}`; productCards.push({ id:Date.now(), code, productId:product.id, productName:product.name, amount:product.price, maxUses:uses, usedCount:0, status:"active", createdBy:"admin" }); saveProductCards(productCards); renderCardList(); alert("卡密:"+code); }
    function renderCardList() { document.getElementById("allProductCards").innerHTML = productCards.map(c=>`<div class="product-item">${c.productName} 卡密:${c.code} 剩余${c.maxUses-c.usedCount}次<button onclick="deleteCard(${c.id})">删除</button></div>`).join("")||"暂无"; }
    window.deleteCard = (id)=>{ productCards=productCards.filter(c=>c.id!==id); saveProductCards(productCards); renderCardList(); };
    function renderProductForCardSelect() { let options = products.filter(p=>p.status==="active").map(p=>`<option value='${JSON.stringify(p)}'>${p.name} - ¥${p.price}</option>`).join(""); document.getElementById("productForCard").innerHTML = options; }
    function resetData() { localStorage.clear(); location.reload(); }

    document.getElementById("createAgentBtn").onclick = generateAgent;
    document.getElementById("genProductCardBtn").onclick = generateCard;
    document.getElementById("resetDataBtn").onclick = ()=>{ if(confirm("重置所有数据?")) resetData(); };
    document.getElementById("enableLockBtn").onclick = ()=>{ localStorage.setItem("attack_mode","true"); location.reload(); };
    document.getElementById("disableLockBtn").onclick = ()=>{ localStorage.setItem("attack_mode","false"); location.reload(); };
    document.getElementById("searchAgent")?.addEventListener("input", renderAgentList);
    document.getElementById("searchUser")?.addEventListener("input", renderUserList);

    function doLogin() { localStorage.setItem("admin_logged_in","true"); document.getElementById("loginPanel").classList.add("hidden"); document.getElementById("mainPanel").classList.remove("hidden"); updateStats(); renderProducts(); renderCardList(); renderRecharge(); renderWithdraw(); renderUserList(); renderAgentList(); renderProductForCardSelect(); }
    function autoLogin() { if(localStorage.getItem("admin_logged_in")==="true"){ doLogin(); return true; } return false; }
    document.getElementById("adminLoginBtn").onclick = ()=>{ if(document.getElementById("adminPass").value===ADMIN_PASSWORD) doLogin(); else document.getElementById("loginError").innerText="密码错误"; };
    document.getElementById("logoutBtn").onclick = ()=>{ localStorage.removeItem("admin_logged_in"); location.reload(); };
    if(!autoLogin()) document.getElementById("loginPanel").classList.remove("hidden");

    window.grantAgent = grantAgent;
    window.revokeAgent = revokeAgent;
</script>
</body>
</html>
